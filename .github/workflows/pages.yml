name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: webapp/package-lock.json
      - name: webapp 의존성 설치
        working-directory: webapp
        run: npm ci
      # todo/36 — 검사를 개별 나열하지 않고 verify 한 줄로(단일 원천): 나열 방식은 todo/30·35가
      # verify에 추가한 check-perf-budget·check-i18n-keys를 CI에서 빠뜨리는 구멍을 만들었다.
      # 앞으로 verify에 게이트를 추가하면 CI가 자동으로 포함한다. (verify의 tsc -b --noEmit은
      # 아래 build의 tsc와 중복 실행이지만 순수 검사라 무해 — 구멍보다 중복이 낫다.)
      - name: webapp 통합 검증 (lint·경계·i18n 3종·성능 예산 — npm run verify 단일 게이트)
        working-directory: webapp
        run: npm run verify
      - name: webapp 빌드 (tsc + vite)
        working-directory: webapp
        run: npm run build
      - name: webapp 번들 예산 체크 (FRONTEND.md 「성능 예산」 — work 180KB/student 70KB gz)
        working-directory: webapp
        run: npm run size
      # 병행 배포(FRONTEND.md '기존 배포 철수' 1단계): 사이트 루트는 spike/(스파이크·
      # register.html)가 그대로 차지하고, 새 통합 웹앱은 /app/ 서브패스에만 얹는다.
      - name: 배포 아티팩트 조립 (spike=루트 + webapp/dist=/app/)
        run: |
          mkdir -p _site
          cp -r spike/. _site/
          mkdir -p _site/app
          cp -r webapp/dist/. _site/app/
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site
      - id: deployment
        uses: actions/deploy-pages@v4
