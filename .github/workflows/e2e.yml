name: E2E Smoke

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: webapp/package-lock.json
      - name: webapp 의존성 설치
        working-directory: webapp
        run: npm ci
      - name: Playwright 브라우저 설치 (Chromium만 — todo/27 스모크 스위트 범위)
        working-directory: webapp
        run: npx playwright install --with-deps chromium
      - name: E2E 스모크 실행 (SessionGate → 대출·반납 → 등록 → catalog 정렬 → 언어 토글 → 인쇄 스냅샷, 목 백엔드)
        working-directory: webapp
        run: npm run e2e
      - name: 실패 시 Playwright 리포트·트레이스 업로드
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: |
            webapp/playwright-report/
            webapp/test-results/
          retention-days: 14
